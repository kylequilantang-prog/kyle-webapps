<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyle Apps">
<title>Kyle's Web Apps</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0A0F1F;
    color: #E9E4F5;
    min-height: 100vh;
    padding: 40px 20px 60px;
    padding-top: max(40px, env(safe-area-inset-top));
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
  .sub { font-size: 13px; color: #9AA8C7; margin-top: 6px; }
  .grid { display: flex; flex-direction: column; gap: 14px; }
  a.card {
    display: block;
    padding: 20px;
    background: #111A2E;
    border: 1px solid #1F2A44;
    border-radius: 14px;
    color: inherit;
    text-decoration: none;
    transition: transform 0.15s, border-color 0.15s;
  }
  a.card:active { transform: scale(0.98); border-color: #F59E0B; }
  .card-title { font-size: 17px; font-weight: 600; }
  .card-desc { font-size: 13px; color: #9AA8C7; margin-top: 4px; line-height: 1.45; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Kyle's Apps</h1>
    <div class="sub">Add to Home Screen for a full PWA</div>
  </header>
  <div class="grid">
    <a class="card" href="./daily-briefing/">
      <div class="card-title">Morning Briefing</div>
      <div class="card-desc">Today's WHY, non-negotiables, CRM radar, pipeline, tasks.</div>
    </a>
    <a class="card" href="./context-switch-bridge/">
      <div class="card-title">Context Switch Bridge</div>
      <div class="card-desc">Reset and transition between modes.</div>
    </a>
  </div>
</div>
</body>
</html>
